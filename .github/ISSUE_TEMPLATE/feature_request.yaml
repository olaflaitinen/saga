name: Feature request
description: Propose an enhancement to the SAGA architecture, evaluation, or documentation.
title: "[FEAT] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your feature proposal. Please describe the enhancement clearly.
        Before opening this issue, check whether the feature is already listed in
        `docs/roadmap.md` as a planned future-work direction.

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: >
        What problem does this feature solve? Which use case or research direction
        does it enable?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: >
        Describe your proposed solution. If it involves a new model component or
        evaluation metric, describe the interface you would expect (inputs, outputs,
        configuration keys).
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternative approaches you considered and why you chose this one.
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: Model architecture (`src/saga/model/`)
        - label: Tokenization (`src/saga/tokenization/`)
        - label: Conformal calibration (`src/saga/conformal/`)
        - label: Evaluation (`src/saga/evaluation/`)
        - label: Baselines (`src/saga/baselines/`)
        - label: Documentation (`docs/`)
        - label: Scripts or notebooks
        - label: Infrastructure (CI, Docker, packaging)
