name: Continuous integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint and format check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linting dependencies
        run: pip install ruff>=0.4 black>=24
      - name: Run ruff
        run: ruff check src/ tests/
      - name: Run black format check
        run: black --check src/ tests/

  typecheck:
    name: Type check with mypy
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run mypy
        run: mypy --strict src/saga

  test-unit:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/unit/ -q --tb=short --cov=src/saga --cov-report=xml
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  test-integration:
    name: Integration tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run integration tests
        run: pytest tests/integration/ -q --tb=short

  test-property:
    name: Property-based tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run property tests
        run: pytest tests/property/ -q --tb=short

  em-dash-check:
    name: Prohibit em-dash and en-dash
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Check for em-dash (U+2014)
        run: |
          if grep -rP "\x{2014}" --include="*.md" --include="*.py" \
              --include="*.yaml" --include="*.toml" --include="*.sh" .; then
            echo "ERROR: em-dash (U+2014) found in repository files."
            exit 1
          fi
      - name: Check for en-dash (U+2013) outside BibTeX pages fields
        run: |
          if grep -rP "\x{2013}" --include="*.md" --include="*.py" \
              --include="*.yaml" --include="*.toml" --include="*.sh" .; then
            echo "ERROR: en-dash (U+2013) found in non-BibTeX files."
            exit 1
          fi
