name: Bug report
description: Report incorrect behavior in the SAGA code or documentation.
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in the sections below
        as completely as possible. If the bug is related to reproducing paper results,
        use the Reproducibility Question template instead.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: A minimal code snippet or sequence of commands that reproduces the bug.
      placeholder: |
        1. Import ...
        2. Call ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include the full traceback if applicable.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: SAGA version
      description: Output of `python -c "import saga; print(saga.__version__)"`
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      description: Output of `python --version`
      placeholder: "3.11.x"
    validations:
      required: true

  - type: input
    id: torch_version
    attributes:
      label: PyTorch version
      description: Output of `python -c "import torch; print(torch.__version__)"`
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: OS, CUDA version, GPU model if relevant.
    validations:
      required: false
