site_name: SAGA Documentation
site_description: Sequence-Adaptive Generative Architecture for multi-horizon probabilistic earnings forecasting.
site_url: https://olaflaitinen.github.io/saga
repo_url: https://github.com/olaflaitinen/saga
repo_name: olaflaitinen/saga

theme:
  name: material
  palette:
    primary: deep blue
    accent: teal
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mermaid2

markdown_extensions:
  - tables
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Paper mirror:
    - Abstract: paper-mirror/00-abstract.md
    - Introduction: paper-mirror/01-introduction.md
    - Related work: paper-mirror/02-related-work.md
    - Method: paper-mirror/03-method.md
    - Data: paper-mirror/04-data.md
    - Experiments: paper-mirror/05-experiments.md
    - Discussion: paper-mirror/06-discussion.md
    - Conclusion: paper-mirror/07-conclusion.md
    - Appendix A: paper-mirror/appendix-a-hyperparameters.md
    - Appendix B: paper-mirror/appendix-b-diebold-mariano.md
    - Appendix C: paper-mirror/appendix-c-gkos-estimation.md
    - Appendix D: paper-mirror/appendix-d-synthetic-data-protocol.md
    - Appendix E: paper-mirror/appendix-e-adaptive-temporal-conformal.md
    - Appendix F: paper-mirror/appendix-f-monte-carlo-sensitivity.md
    - Appendix G: paper-mirror/appendix-g-reproducibility.md
  - Results:
    - Headline accuracy: results/headline-forecast-accuracy.md
    - Calibration coverage: results/calibration-coverage.md
    - Lifetime earnings: results/lifetime-earnings-distribution.md
    - Tax microsimulation: results/downstream-tax-microsimulation.md
    - Ablation study: results/ablation-study.md
    - Heterogeneity: results/heterogeneity-decomposition.md
    - Robustness: results/robustness-checks.md
    - Placebo tests: results/placebo-and-falsification.md
    - Computational cost: results/computational-cost.md
    - Interpretability: results/interpretability-attention.md
  - Methodology:
    - Architecture: methodology/saga-architecture.md
    - Tokenization: methodology/tokenization-scheme.md
    - Training objective: methodology/training-objective.md
    - Split conformal: methodology/split-conformal-calibration.md
    - Theorem 2: methodology/adaptive-temporal-conformal-theorem.md
    - Lifetime MC: methodology/lifetime-monte-carlo-aggregation.md
    - Baselines: methodology/baselines.md
  - Data:
    - LISA overview: data/lisa-register-overview.md
    - Variable inventory: data/variable-inventory.md
    - Sample selection: data/sample-selection-rules.md
    - Splits: data/train-cal-test-splits.md
    - MONA: data/mona-secure-environment.md
    - Synthetic mirror: data/synthetic-mirror.md
  - Reproducibility:
    - Quickstart: reproducibility/quickstart.md
    - Full replication: reproducibility/full-replication.md
    - Docker: reproducibility/docker-environment.md
    - Seeds: reproducibility/seed-list.md
    - Hardware: reproducibility/hardware-notes.md
    - Wall-clock: reproducibility/wall-clock-budgets.md
  - Ethics:
    - Ethical approval: ethics/ethical-approval.md
    - Data governance: ethics/data-governance.md
    - Broader impact: ethics/broader-impact.md
    - Dual-use: ethics/dual-use-statement.md
  - Deployment:
    - Model card: deployment/model-card.md
    - Microsimulation: deployment/microsimulation-integration.md
    - Inference latency: deployment/inference-latency.md
  - Bibliography: bibliography/references.md
  - Glossary: glossary.md
  - FAQ: faq.md
  - Roadmap: roadmap.md
